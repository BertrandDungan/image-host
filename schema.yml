openapi: 3.0.3
info:
  title: Image-host
  version: 0.0.0
paths:
  /api/images/:
    get:
      operationId: images_retrieve
      description: Returns each image's id and absolute URL for an image owned by
        the user at the given size. Medium thumbnails and originals require Premium
        or Enterprise.
      summary: List image ids and URLs by user and size
      parameters:
      - in: query
        name: image_size
        schema:
          type: string
          enum:
          - '200'
          - '400'
          - original
        description: Variant size key (matches `ImageSize`).
        required: true
      - in: query
        name: user_id
        schema:
          type: integer
        description: Owner user ID.
        required: true
      tags:
      - images
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageGetUrlsResponse'
          description: Matching image ids and URLs (may be empty).
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImagePutError'
          description: Missing or invalid query parameters, or unknown user.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImagePutError'
          description: Account tier does not allow this image size.
    put:
      operationId: images_update
      description: Multipart upload that creates three `Image` objects (small thumbnail,
        medium thumbnail, and original)
      summary: Upload image
      tags:
      - images
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ImagePutRequest'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '204':
          description: Three image variants were stored successfully.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImagePutError'
          description: 'Input validation failure. Failure reason is under `detail` '
  /api/share-links/:
    post:
      operationId: share_links_create
      description: Creates a `Share_Link` for the given image. Expiry is computed
        from now plus `expiry_seconds`.
      summary: Create share link
      tags:
      - share-links
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShareLinkCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ShareLinkCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ShareLinkCreate'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Share_Link'
          description: Share link was created.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShareLinkError'
          description: Invalid request body or unknown image id.
  /api/share-links/{id}/:
    get:
      operationId: share_links_retrieve
      description: Returns the `Image` referenced by this share link. The path `id`
        is the share link id, not the image id. Responds with 404 if the link does
        not exist or `expiry` is in the past.
      summary: Get image via share link
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this share_ link.
        required: true
      tags:
      - share-links
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Image'
          description: The shared image.
        '404':
          description: Unknown share link, or the link has expired.
  /api/users/:
    get:
      operationId: users_list
      tags:
      - users
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
          description: ''
  /api/users/{id}/:
    get:
      operationId: users_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this user.
        required: true
      tags:
      - users
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
components:
  schemas:
    AccountTierEnum:
      enum:
      - Basic
      - Premium
      - Enterprise
      type: string
      description: |-
        * `Basic` - Basic
        * `Premium` - Premium
        * `Enterprise` - Enterprise
    Image:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 255
        owner:
          type: integer
        image:
          type: string
          format: uri
        size:
          $ref: '#/components/schemas/SizeEnum'
      required:
      - id
      - image
      - owner
      - size
      - title
    ImageGetUrlsResponse:
      type: object
      description: JSON body listing image ids and absolute URLs for the requested
        size.
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ImageListItem'
      required:
      - items
    ImageListItem:
      type: object
      description: 'One image variant: database id and absolute URL.'
      properties:
        id:
          type: integer
          description: Primary key of the `Image` row for this size.
        url:
          type: string
          format: uri
          description: Absolute URL to the stored file for this size.
      required:
      - id
      - url
    ImagePutError:
      type: object
      description: Error body when validation fails before persistence.
      properties:
        detail:
          type: string
          description: Human-readable error.
    ImagePutRequest:
      type: object
      description: Multipart body for uploading an image.
      properties:
        user_id:
          type: integer
          description: ID of the user who will own the uploaded image.
        filename:
          type: string
          maxLength: 255
        image:
          type: string
          format: binary
          description: Image file. Only PNG and JPEG are accepted.
      required:
      - filename
      - image
      - user_id
    ShareLinkCreate:
      type: object
      description: JSON body to create a time-limited share link for an image.
      properties:
        image:
          type: integer
          description: Primary key of the image to share.
        expiry_seconds:
          type: integer
          maximum: 30000
          minimum: 300
          description: Seconds until the link expires (inclusive range 300–30000).
      required:
      - expiry_seconds
      - image
    ShareLinkError:
      type: object
      description: Error body when share link creation validation fails.
      properties:
        detail:
          type: string
          description: Human-readable error.
    Share_Link:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        image:
          type: integer
        expiry:
          type: string
          format: date-time
      required:
      - expiry
      - id
      - image
    SizeEnum:
      enum:
      - '200'
      - '400'
      - original
      type: string
      description: |-
        * `200` - Small Thumbnail
        * `400` - Medium Thumbnail
        * `original` - Original
    User:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        account_tier:
          $ref: '#/components/schemas/AccountTierEnum'
      required:
      - account_tier
      - id
      - name
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
